<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Login — Olympia Track</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-tertiary-container": "#9779ff",
            "tertiary": "#16004a",
            "primary": "#04122e",
            "surface-dim": "#cdd9ff",
            "background": "#faf8ff",
            "on-secondary-container": "#007150",
            "on-primary-fixed-variant": "#3a4665",
            "error": "#ba1a1a",
            "secondary-fixed-dim": "#5ddcaa",
            "surface-container": "#e9edff",
            "tertiary-fixed-dim": "#ccbdff",
            "primary-container": "#1a2744",
            "surface-container-high": "#e1e8ff",
            "outline-variant": "#c5c6ce",
            "primary-fixed-dim": "#b9c6eb",
            "on-primary-fixed": "#0d1b37",
            "inverse-primary": "#b9c6eb",
            "on-background": "#0d1b37",
            "surface-tint": "#515e7e",
            "surface-container-low": "#f2f3ff",
            "on-error": "#ffffff",
            "surface-bright": "#faf8ff",
            "on-primary-container": "#828eb1",
            "outline": "#75777e",
            "on-secondary-fixed": "#002115",
            "surface-variant": "#d9e2ff",
            "inverse-on-surface": "#edf0ff",
            "on-error-container": "#93000a",
            "on-primary": "#ffffff",
            "inverse-surface": "#23304d",
            "on-tertiary": "#ffffff",
            "on-secondary-fixed-variant": "#005139",
            "primary-fixed": "#d9e2ff",
            "on-secondary": "#ffffff",
            "on-surface-variant": "#45464d",
            "tertiary-container": "#2c0080",
            "error-container": "#ffdad6",
            "secondary-container": "#79f6c2",
            "surface-container-highest": "#d9e2ff",
            "tertiary-fixed": "#e7deff",
            "on-tertiary-fixed": "#1f005f",
            "on-tertiary-fixed-variant": "#4d17c5",
            "secondary-fixed": "#7cf9c5",
            "surface": "#faf8ff",
            "secondary": "#006c4c",
            "on-surface": "#0d1b37",
            "surface-container-lowest": "#ffffff"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    body { font-family: 'Inter', sans-serif; zoom: 110%; }
  </style>
</head>
<body class="min-h-screen bg-background flex items-center justify-center relative overflow-hidden">

  <!-- Abstract background elements -->
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 rounded-full bg-secondary/10 blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-5%] w-80 h-80 rounded-full bg-primary-container/20 blur-3xl pointer-events-none"></div>
  <div class="absolute top-1/2 left-1/3 w-64 h-64 rounded-full bg-tertiary-fixed-dim/10 blur-2xl pointer-events-none"></div>

  <div class="relative w-full max-w-md px-4">

    <!-- Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary-container mb-4">
        <span class="text-white font-extrabold text-xl font-headline">OT</span>
      </div>
      <h1 class="text-3xl font-extrabold font-headline text-on-surface tracking-tight">Olympia Track</h1>
      <p class="text-on-surface-variant text-sm mt-1">Elite Management Portal</p>
    </div>

    <!-- Error -->
    {% if error %}
    <div class="mb-5 flex items-center gap-3 p-4 bg-error-container rounded-xl border-l-4 border-error">
      <span class="material-symbols-outlined text-error text-lg">error</span>
      <p class="text-sm font-medium text-on-error-container">{{ error }}</p>
    </div>
    {% endif %}

    <!-- Login Card -->
    <div class="bg-surface-container-lowest rounded-2xl shadow-lg p-8 border border-outline-variant/20">
      <h2 class="text-lg font-bold text-on-surface mb-6">Sign in to your account</h2>

      <form action="/ui/login" method="post" autocomplete="off">
        <div class="mb-4">
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2" for="username">
            Username
          </label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">account_circle</span>
            <input type="text" id="username" name="username"
                   class="w-full bg-surface-container-low border-none rounded-xl pl-10 pr-4 py-3 text-sm text-on-surface focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container transition-all duration-200"
                   placeholder="your username" required autofocus
                   value="{{ username or '' }}"/>
          </div>
        </div>

        <div class="mb-6">
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2" for="password">
            Password
          </label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
            <input type="password" id="password" name="password"
                   class="w-full bg-surface-container-low border-none rounded-xl pl-10 pr-4 py-3 text-sm text-on-surface focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container transition-all duration-200"
                   placeholder="your password" required/>
          </div>
        </div>

        <button type="submit"
                class="w-full flex items-center justify-center gap-2 bg-primary hover:bg-primary-container text-white px-5 py-3 rounded-xl text-sm font-semibold transition-all shadow-sm">
          Sign In to Dashboard
          <span class="material-symbols-outlined text-lg">arrow_forward</span>
        </button>
      </form>
    </div>

    <!-- Demo Hint -->
    <div class="text-center mt-6">
      <p class="text-xs text-on-surface-variant">Demo accounts:</p>
      <p class="text-xs text-on-surface-variant mt-1">
        <span class="font-medium text-on-surface">vikram_admin</span> / admin123
        &bull;
        <span class="font-medium text-on-surface">raj_coach</span> / coach123
        &bull;
        <span class="font-medium text-on-surface">aarav_player</span> / player123
      </p>
    </div>

  </div>
</body>
</html>
