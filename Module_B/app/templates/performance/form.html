{% extends "base.html" %}
{% block title %}Edit Performance Log — Olympia Track{% endblock %}
{% block content %}
<div class="page-header d-print-none">
  <div class="container-xl">
    <div class="row g-2 align-items-center">
      <div class="col-auto">
        <a href="/ui/members/{{ log.MemberID }}" class="btn btn-outline-secondary btn-sm">Back</a>
      </div>
      <div class="col"><h2 class="page-title">Edit Performance Log</h2></div>
    </div>
  </div>
</div>

<div class="page-body">
  <div class="container-xl">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <div class="card" style="max-width:600px">
      <div class="card-body">
        <form method="post" action="/ui/performance-logs/{{ log.LogID }}/edit">
          <input type="hidden" name="member_id" value="{{ log.MemberID }}"/>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Sport</label>
              <select name="sport_id" class="form-select" required>
                {% for s in sports %}
                <option value="{{ s.SportID }}" {% if s.SportID == log.SportID %}selected{% endif %}>
                  {{ s.SportName }}
                </option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Date</label>
              <input type="date" name="record_date" class="form-control" required
                     value="{{ log.RecordDate }}"/>
            </div>
            <div class="col-md-6">
              <label class="form-label">Metric Name</label>
              <input type="text" name="metric_name" class="form-control" required
                     value="{{ log.MetricName }}" placeholder="e.g. Speed (m/s)"/>
            </div>
            <div class="col-md-6">
              <label class="form-label">Value</label>
              <input type="number" step="0.01" name="metric_value" class="form-control" required
                     value="{{ log.MetricValue }}"/>
            </div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/ui/members/{{ log.MemberID }}" class="btn">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
