{% extends "base.html" %}
{% block title %}Edit Performance Log — Olympia Track{% endblock %}
{% block content %}
<div class="pt-6 pb-12 px-4 sm:px-8 max-w-2xl mx-auto">

  <a href="/ui/members/{{ log.MemberID }}" class="inline-flex items-center gap-2 text-sm text-on-surface-variant hover:text-on-surface mb-6 transition-colors">
    <span class="material-symbols-outlined text-lg">arrow_back</span>
    Back to Member
  </a>

  <div class="mb-8">
    <span class="text-secondary font-semibold text-xs tracking-[0.2em] uppercase mb-2 block">Performance</span>
    <h2 class="text-3xl font-extrabold font-headline text-on-surface tracking-tight">Edit Log Entry</h2>
  </div>

  {% if error %}
  <div class="mb-6 flex items-center gap-3 p-4 bg-error-container rounded-xl border-l-4 border-error">
    <span class="material-symbols-outlined text-error">error</span>
    <p class="text-sm font-medium text-on-error-container">{{ error }}</p>
  </div>
  {% endif %}

  <div class="bg-surface-container-lowest rounded-xl shadow-sm p-6 sm:p-8">
    <form method="post" action="/ui/performance-logs/{{ log.LogID }}/edit">
      <input type="hidden" name="member_id" value="{{ log.MemberID }}"/>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2">Sport</label>
          <select name="sport_id" required
                  class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-sm text-on-surface focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container transition-all duration-200">
            {% for s in sports %}
            <option value="{{ s.SportID }}" {% if s.SportID == log.SportID %}selected{% endif %}>{{ s.SportName }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2">Date</label>
          <input type="date" name="record_date" required value="{{ log.RecordDate }}"
                 class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-sm text-on-surface focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container transition-all duration-200"/>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2">Metric Name</label>
          <input type="text" name="metric_name" required value="{{ log.MetricName }}" placeholder="e.g. Speed (m/s)"
                 class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-sm text-on-surface focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container transition-all duration-200"/>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2">Value</label>
          <input type="number" step="0.01" name="metric_value" required value="{{ log.MetricValue }}"
                 class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-sm text-on-surface focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container transition-all duration-200"/>
        </div>
      </div>
      <div class="flex items-center gap-3 mt-8">
        <button type="submit"
                class="bg-primary hover:bg-primary-container text-white px-6 py-2.5 rounded-lg text-sm font-semibold transition-all shadow-sm">
          Save Changes
        </button>
        <a href="/ui/members/{{ log.MemberID }}"
           class="bg-surface-container-lowest border border-outline-variant/30 text-on-surface px-6 py-2.5 rounded-lg text-sm font-semibold hover:bg-surface-container-low transition-all">
          Cancel
        </a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
