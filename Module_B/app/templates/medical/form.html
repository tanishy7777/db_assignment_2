{% extends "base.html" %}
{% block title %}Edit Medical Record — Olympia Track{% endblock %}
{% block content %}
<div class="page-header d-print-none">
  <div class="container-xl">
    <div class="row g-2 align-items-center">
      <div class="col-auto">
        <a href="/ui/members/{{ record.MemberID }}" class="btn btn-outline-secondary btn-sm">Back</a>
      </div>
      <div class="col"><h2 class="page-title">Edit Medical Record</h2></div>
    </div>
  </div>
</div>

<div class="page-body">
  <div class="container-xl">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <div class="card" style="max-width:600px">
      <div class="card-body">
        <form method="post" action="/ui/medical-records/{{ record.RecordID }}/edit">
          <input type="hidden" name="member_id" value="{{ record.MemberID }}"/>
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Condition</label>
              <input type="text" name="medical_condition" class="form-control" required
                     value="{{ record.MedicalCondition }}"/>
            </div>
            <div class="col-md-4">
              <label class="form-label">Diagnosis Date</label>
              <input type="date" name="diagnosis_date" class="form-control" required
                     value="{{ record.DiagnosisDate }}"/>
            </div>
            <div class="col-md-4">
              <label class="form-label">Recovery Date <span class="text-muted">(opt.)</span></label>
              <input type="date" name="recovery_date" class="form-control"
                     value="{{ record.RecoveryDate or '' }}"/>
            </div>
            <div class="col-md-4">
              <label class="form-label">Status</label>
              <select name="status" class="form-select" required>
                <option value="Active" {% if record.Status == 'Active' %}selected{% endif %}>Active</option>
                <option value="Recovered" {% if record.Status == 'Recovered' %}selected{% endif %}>Recovered</option>
                <option value="Chronic" {% if record.Status == 'Chronic' %}selected{% endif %}>Chronic</option>
              </select>
            </div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/ui/members/{{ record.MemberID }}" class="btn">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
